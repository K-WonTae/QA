<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>업무 문서 Q&A</title>
  <style>
    /* ===== 밝은 테마 ===== */
    :root {
      --bg: #eef1f7;
      --panel: #ffffff;
      --panel-2: #f3f6fc;
      --border: #d9e1ee;
      --border-soft: #e6ecf5;
      --text: #1d2531;
      --muted: #6a7689;
      --accent: #3f66f0;
      --accent-2: #2b4fd8;
      --accent-soft: #eaf0ff;
      --user-bubble: #3f66f0;
      --assistant-bubble: #ffffff;
      --danger: #e0413f;
      --ok: #16a35a;
      --radius: 14px;
      --shadow: 0 6px 22px rgba(31,52,98,.10);
      --shadow-soft: 0 2px 8px rgba(31,52,98,.06);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "Pretendard", "Inter", -apple-system, "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
      color: var(--text);
      display: flex; flex-direction: column; height: 100vh;
      background:
        radial-gradient(820px 420px at 88% -8%, rgba(91,134,255,.10), transparent 60%),
        radial-gradient(620px 420px at -6% 108%, rgba(63,102,240,.07), transparent 55%),
        var(--bg);
    }

    /* 헤더 */
    header {
      display: flex; align-items: center; gap: 12px; padding: 12px 22px;
      background: rgba(255,255,255,.85); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-soft); flex-shrink: 0;
    }
    header .dot {
      width: 26px; height: 26px; border-radius: 8px; position: relative;
      background: linear-gradient(135deg, #5b86ff, #8b5bff);
      box-shadow: 0 2px 10px rgba(91,134,255,.4);
    }
    header .dot::after { content: "Q"; position: absolute; inset: 0; display: grid; place-items: center;
      font-size: 14px; font-weight: 800; color: #fff; }
    header h1 { font-size: 15.5px; font-weight: 700; margin: 0; letter-spacing: -.2px; }
    header .spacer { margin-left: auto; }
    header .hbtn {
      margin-left: 10px; background: var(--panel); border: 1px solid var(--border);
      color: #41506a; border-radius: 9px; padding: 7px 12px; font-size: 12.5px; font-weight: 500;
      font-family: inherit; cursor: pointer; transition: all .15s; box-shadow: var(--shadow-soft);
    }
    header .hbtn:hover { border-color: var(--accent); color: var(--accent-2); transform: translateY(-1px); }
    header a.manage {
      margin-left: 10px; font-size: 12.5px; color: #fff; font-weight: 600; text-decoration: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-2)); padding: 8px 13px; border-radius: 9px;
      box-shadow: 0 2px 10px rgba(63,102,240,.3); transition: all .15s;
    }
    header a.manage:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(63,102,240,.45); }
    header #userInfo { font-size: 12.5px; color: var(--muted); margin-left: 14px; }

    /* 본문: 사이드바 + 메인 */
    .app-body { flex: 1; display: flex; min-height: 0; }

    /* ===== 좌측 사이드바(구분자 체크리스트) ===== */
    .sidebar {
      width: 280px; flex-shrink: 0; display: flex; flex-direction: column;
      background: rgba(255,255,255,.6); border-right: 1px solid var(--border-soft);
      padding: 16px 14px; overflow-y: auto;
    }
    .side-head { display: flex; align-items: center; margin-bottom: 4px; }
    .side-head h2 { font-size: 13px; font-weight: 700; margin: 0; color: #2b3650; letter-spacing: -.1px; }
    .side-actions { margin-left: auto; display: flex; gap: 6px; }
    .side-actions button {
      background: var(--panel); border: 1px solid var(--border); color: var(--muted);
      border-radius: 7px; padding: 3px 8px; font-size: 11px; cursor: pointer; font-family: inherit; transition: all .12s;
    }
    .side-actions button:hover { border-color: var(--accent); color: var(--accent-2); }
    .side-hint { font-size: 11.5px; color: var(--muted); margin: 6px 2px 14px; line-height: 1.5; }
    .src-group-label { font-size: 11px; font-weight: 700; color: #97a2b5; margin: 12px 4px 7px; letter-spacing: .3px; }
    .src-group-label:first-child { margin-top: 0; }

    .src-item {
      display: flex; align-items: center; gap: 11px; padding: 12px 13px; cursor: pointer;
      border: 1.5px solid var(--border); border-radius: 12px; background: var(--panel);
      margin-bottom: 9px; transition: all .15s; box-shadow: var(--shadow-soft);
    }
    .src-item:hover { border-color: #b6c6ef; transform: translateY(-1px); }
    .src-item input { position: absolute; opacity: 0; pointer-events: none; }
    .src-box {
      width: 21px; height: 21px; border-radius: 6px; border: 2px solid #c3cee0; flex-shrink: 0;
      display: grid; place-items: center; background: #fff; transition: all .15s;
    }
    .src-box::after {
      content: "✓"; font-size: 13px; font-weight: 800; color: #fff;
      opacity: 0; transform: scale(.4); transition: all .15s;
    }
    .src-text { font-size: 13.5px; color: #44516a; line-height: 1.35; }
    .src-text b { display: inline-block; font-size: 10.5px; font-weight: 700; color: #8a96ab;
      background: var(--panel-2); border: 1px solid var(--border); border-radius: 5px; padding: 0 5px; margin-right: 5px; }
    .src-sub { display: block; font-size: 11px; color: var(--muted); font-weight: 400; margin-top: 2px; }
    /* 선택 상태 */
    .src-item.checked { border-color: var(--accent); background: var(--accent-soft); box-shadow: 0 3px 12px rgba(63,102,240,.16); }
    .src-item.checked .src-box { background: var(--accent); border-color: var(--accent); }
    .src-item.checked .src-box::after { opacity: 1; transform: scale(1); }
    .src-item.checked .src-text { color: var(--text); font-weight: 600; }
    .src-item.checked .src-text b { color: var(--accent-2); background: #fff; border-color: #c5d3fb; }

    .side-sep { height: 1px; background: var(--border-soft); margin: 8px 2px 14px; }
    .src-item.dev .src-box { border-radius: 6px; }
    .src-item.dev.checked { border-color: #8b5bff; background: #f1ecff; box-shadow: 0 3px 12px rgba(139,91,255,.16); }
    .src-item.dev.checked .src-box { background: #8b5bff; border-color: #8b5bff; }
    .src-empty { font-size: 12.5px; color: var(--muted); text-align: center; padding: 18px 8px; line-height: 1.6; }
    .src-empty a { color: var(--accent); }

    /* ===== 메인 컬럼 ===== */
    .main-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    #log { flex: 1; overflow-y: auto; padding: 28px 18px 12px; display: flex; flex-direction: column; gap: 22px; scroll-behavior: smooth; }
    .turn { max-width: 860px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; }
    .turn.user { align-items: flex-end; }
    .turn.assistant { align-items: flex-start; }
    .turn .role { display: flex; align-items: center; gap: 9px; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 7px; }
    .turn .role::before { content: ""; width: 24px; height: 24px; border-radius: 8px; flex-shrink: 0; box-shadow: var(--shadow-soft); }
    .turn.assistant .role::before { background: linear-gradient(135deg, #5b86ff, #8b5bff); }
    .turn.user .role { flex-direction: row-reverse; }
    .turn.user .role::before { background: linear-gradient(135deg, #3f66f0, #2b3fae); }

    .bubble { max-width: 86%; padding: 14px 17px; border-radius: 16px; font-size: 14.5px; line-height: 1.7; word-break: break-word; }
    .turn.assistant .bubble { background: var(--assistant-bubble); border: 1px solid var(--border); border-bottom-left-radius: 5px; box-shadow: var(--shadow-soft); }
    .turn.user .bubble { background: linear-gradient(135deg, #3f66f0, #3556d8); color: #fff; border-bottom-right-radius: 5px; white-space: pre-wrap; box-shadow: 0 4px 16px rgba(63,102,240,.24); }

    .bubble h3 { font-size: 15.5px; font-weight: 700; margin: 16px 0 8px; color: #16203a; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .bubble h4 { font-size: 14px; font-weight: 650; margin: 13px 0 6px; color: #364257; }
    .bubble h3:first-child, .bubble h4:first-child { margin-top: 2px; }
    .bubble p { margin: 8px 0; }
    .bubble ul { margin: 8px 0; padding-left: 20px; }
    .bubble li { margin: 4px 0; }
    .bubble li::marker { color: var(--accent); }
    .bubble strong { color: #16203a; font-weight: 700; }
    .bubble code { background: #f1f4fa; border: 1px solid var(--border); border-radius: 6px; padding: 1.5px 6px; font-size: 12.5px; color: #1d7a46; font-family: "Cascadia Code", "JetBrains Mono", Consolas, monospace; }
    .bubble pre { background: #0f1623; border: 1px solid #1d2738; border-radius: 12px; padding: 14px 16px; margin: 12px 0; overflow-x: auto; }
    .bubble pre code { background: none; border: none; padding: 0; color: #d3deee; font-size: 12.5px; line-height: 1.6; white-space: pre; display: block; }

    .tbl-wrap { margin: 12px 0; overflow-x: auto; border: 1px solid var(--border); border-radius: 12px; }
    .bubble table { border-collapse: collapse; width: 100%; font-size: 13px; }
    .bubble thead th { background: var(--panel-2); color: #2b3650; font-weight: 650; text-align: left; padding: 10px 13px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    .bubble tbody td { padding: 9px 13px; border-bottom: 1px solid var(--border-soft); color: #3a4760; vertical-align: top; }
    .bubble tbody tr:last-child td { border-bottom: none; }
    .bubble tbody tr:nth-child(even) { background: rgba(63,102,240,.025); }
    .bubble tbody tr:hover { background: rgba(63,102,240,.06); }

    .role-label { font-size: 11.5px; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
    .meta { font-size: 11.5px; color: var(--muted); margin-top: 10px; padding-top: 9px; border-top: 1px solid var(--border-soft); display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .tag { background: var(--panel-2); border: 1px solid var(--border); border-radius: 7px; padding: 1px 7px; font-size: 11px; color: #5a6781; }
    .tag.cat { background: var(--accent-soft); border-color: #c5d3fb; color: var(--accent-2); font-weight: 600; }

    .status-line { font-size: 12.5px; color: var(--muted); display: flex; align-items: center; gap: 7px; }
    .spinner { width: 13px; height: 13px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .cursor { display: inline-block; width: 7px; height: 15px; background: var(--accent); margin-left: 1px; vertical-align: text-bottom; animation: blink 1s steps(2) infinite; border-radius: 1px; }
    @keyframes blink { 50% { opacity: 0; } }

    /* 참고 문서 패널 */
    .sources-panel { margin-top: 10px; padding: 9px 11px; border: 1px solid var(--border-soft); border-radius: 10px; background: var(--panel-2); max-width: 860px; width: 100%; }
    .sp-title { font-size: 11px; color: var(--muted); font-weight: 650; margin-bottom: 6px; }
    .sp-hint { font-weight: 400; opacity: .8; }
    .sp-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .sp-item { font-size: 11.5px; color: var(--accent-2); background: var(--accent-soft); border: 1px solid #c5d3fb; border-radius: 7px; padding: 3px 8px; word-break: break-all; }
    a.sp-item.dl { text-decoration: none; cursor: pointer; transition: background .12s, border-color .12s; }
    a.sp-item.dl:hover { background: #d9e3ff; border-color: var(--accent); }
    a.sp-item.dl .dl-ic { opacity: .7; }

    /* 피드백 */
    .fb-bar { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 8px; max-width: 860px; width: 100%; }
    .fb-btn { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 3px 9px; cursor: pointer; font-size: 14px; line-height: 1; transition: border-color .12s, background .12s; }
    .fb-btn:hover { border-color: var(--accent); }
    .fb-btn.active { background: var(--accent-soft); border-color: var(--accent); }
    .fb-msg { font-size: 11.5px; color: var(--muted); }
    .fb-comment { display: flex; gap: 6px; margin-top: 8px; width: 100%; flex-basis: 100%; }
    .fb-comment textarea { flex: 1; min-height: 48px; resize: vertical; border-radius: 8px; border: 1px solid var(--border); background: var(--panel); color: var(--text); padding: 7px 9px; font-size: 13px; font-family: inherit; }
    .fb-send { align-self: flex-end; background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 7px 12px; cursor: pointer; font-size: 13px; }

    /* 되묻기 칩 */
    .ask-source { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .src-chip { background: var(--panel-2); border: 1px solid var(--border); color: var(--accent-2); border-radius: 8px; padding: 5px 11px; font-size: 13px; cursor: pointer; }
    .src-chip:hover { border-color: var(--accent); background: var(--accent-soft); }
    .src-chip b { color: var(--text); }

    /* 빈 화면 */
    .empty { margin: auto; text-align: center; color: var(--muted); max-width: 520px; }
    .empty h2 { font-size: 22px; font-weight: 750; letter-spacing: -.4px; margin-bottom: 8px;
      background: linear-gradient(135deg, #2b3fae, #6b92ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .examples { display: flex; flex-direction: column; gap: 8px; margin-top: 18px; }
    .example { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 13px 16px; font-size: 13.5px; cursor: pointer; text-align: left; color: #43506a; transition: all .15s; box-shadow: var(--shadow-soft); }
    .example:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(63,102,240,.14); }

    /* 입력 영역 */
    .composer-wrap { flex-shrink: 0; padding: 14px 16px 18px; background: linear-gradient(180deg, transparent, var(--bg) 45%); }
    .composer { max-width: 860px; margin: 0 auto; }
    .input-row { display: flex; align-items: flex-end; gap: 8px; background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 9px 9px 9px 16px; box-shadow: var(--shadow); transition: border-color .15s, box-shadow .15s; }
    .input-row:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(63,102,240,.14), var(--shadow); }
    textarea { flex: 1; background: transparent; border: none; outline: none; resize: none; color: var(--text); font-size: 14.5px; line-height: 1.5; font-family: inherit; max-height: 180px; padding: 6px 0; }
    textarea::placeholder { color: #9aa6ba; }
    button.send { flex-shrink: 0; border: none; border-radius: 11px; cursor: pointer; color: #fff; font-size: 14px; font-weight: 650; height: 40px; padding: 0 20px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); box-shadow: 0 3px 12px rgba(63,102,240,.3); transition: all .15s; }
    button.send:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(63,102,240,.42); }
    button.send.stop { background: linear-gradient(135deg, #f05252, #d83b3b); box-shadow: 0 3px 12px rgba(240,82,82,.3); }
    .hint { text-align: center; font-size: 11.5px; color: var(--muted); margin-top: 9px; }
    .hint kbd { background: var(--panel); border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 4px; padding: 1px 5px; font-size: 10.5px; font-family: inherit; color: #5a6781; }

    /* 이력 서랍 */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(20,30,55,.32); opacity: 0; pointer-events: none; transition: opacity .18s; z-index: 40; }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }
    .drawer { position: fixed; top: 0; left: 0; height: 100%; width: 340px; max-width: 85vw; background: var(--panel); border-right: 1px solid var(--border); transform: translateX(-100%); transition: transform .2s; z-index: 41; display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(20,30,55,.18); }
    .drawer.open { transform: translateX(0); }
    .drawer-head { display: flex; align-items: center; gap: 8px; padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .drawer-head h3 { font-size: 14px; margin: 0; font-weight: 700; }
    .drawer-head .close { margin-left: auto; background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
    .drawer-head .close:hover { color: var(--text); }
    .hist-list { flex: 1; overflow-y: auto; padding: 8px; }
    .hist-item { position: relative; padding: 10px 30px 10px 11px; border-radius: 11px; cursor: pointer; border: 1px solid transparent; margin-bottom: 4px; }
    .hist-item:hover { background: var(--panel-2); }
    .hist-item.active { background: var(--accent-soft); border-color: #c5d3fb; }
    .hist-title { font-size: 13px; color: var(--text); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .hist-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .hist-del { position: absolute; top: 8px; right: 6px; background: none; border: none; color: #aab4c5; font-size: 13px; cursor: pointer; padding: 2px 5px; border-radius: 5px; }
    .hist-item:hover .hist-del { color: var(--danger); }
    .hist-del:hover { background: var(--danger); color: #fff; }
    .hist-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 24px 10px; }

    /* 스크롤바 */
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: #cdd7e8; border-radius: 8px; border: 2px solid var(--bg); }
    *::-webkit-scrollbar-thumb:hover { background: #b6c3da; }

    @media (max-width: 760px) {
      .sidebar { width: 210px; }
      header h1 { font-size: 14px; }
    }
  </style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <h1>업무 문서 Q&A</h1>
    <span class="spacer"></span>
    <button class="hbtn" id="histBtn">🕘 이력</button>
    <button class="hbtn" id="newBtn">＋ 새 대화</button>
    <a class="manage" id="sourcesLink" href="/sources" style="display:none">＋ 폴더 등록</a>
    <a class="manage" id="adminLink" href="/admin" style="display:none">👤 사용자 관리</a>
    <span id="userInfo"></span>
    <button class="hbtn" id="logoutBtn" title="로그아웃">로그아웃</button>
  </header>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <h3>대화 이력</h3>
      <button class="close" id="drawerClose" title="닫기">×</button>
    </div>
    <div class="hist-list" id="histList">
      <div class="hist-empty">불러오는 중…</div>
    </div>
  </aside>

  <div class="app-body">
    <!-- 좌측: 구분자(폴더) 체크리스트 + 개발자 관점 -->
    <aside class="sidebar">
      <div class="side-head">
        <h2>질의 폴더</h2>
        <div class="side-actions">
          <button id="selAll" type="button">전체</button>
          <button id="selNone" type="button">해제</button>
        </div>
      </div>
      <div class="side-hint">체크한 폴더 <b>전체</b>에서 답을 찾습니다. 여러 개를 함께 선택할 수 있어요.</div>
      <div id="sourceList">
        <div class="src-empty">불러오는 중…</div>
      </div>
      <div class="side-sep"></div>
      <label class="src-item dev" id="devToggle">
        <input type="checkbox" id="devView" />
        <span class="src-box"></span>
        <span class="src-text">개발자 관점<span class="src-sub">테이블·컬럼·프로시저 포함</span></span>
      </label>
    </aside>

    <!-- 우측: 대화 + 입력 -->
    <div class="main-col">
      <div id="log">
        <div class="empty" id="empty">
          <h2>무엇이든 물어보세요</h2>
          <div>왼쪽에서 질문할 폴더를 <b>체크</b>한 뒤 질문하세요. 여러 폴더를 함께 선택하면 그 범위 전체에서 찾습니다.</div>
          <div class="examples">
            <div class="example">수강신청 정원 초과는 어느 테이블에서 처리하나요?</div>
            <div class="example">성적 확정 후 정정은 어떻게 처리해야 하나요?</div>
            <div class="example">등록금 가상계좌 입금 대사에서 주의할 점은?</div>
          </div>
        </div>
      </div>

      <div class="composer-wrap">
        <div class="composer">
          <div class="input-row">
            <textarea id="q" rows="1" placeholder="질문을 입력하세요…"></textarea>
            <button class="send" id="send">전송</button>
          </div>
          <div class="hint">
            <kbd>Enter</kbd> 전송 · <kbd>Shift</kbd>+<kbd>Enter</kbd> 줄바꿈 · <kbd>Esc</kbd> 생성 중지
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const APP_TOKEN = "__APP_TOKEN__";
    let sessionId = null;
    let currentUsername = "";
    const sessionStorageKey = () => currentUsername ? ("sessionId:" + currentUsername) : "sessionId";
    const sourceStorageKey = () => currentUsername ? ("sourceIds:" + currentUsername) : "sourceIds";
    let controller = null;
    let streaming = false;
    let currentStreamId = null;

    const logEl = document.getElementById("log");
    const qEl = document.getElementById("q");
    const btn = document.getElementById("send");
    const emptyEl = document.getElementById("empty");
    const sourceListEl = document.getElementById("sourceList");
    let sources = [];

    // ---- 안전한 경량 마크다운 렌더 ----
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function inline(s) {
      s = escapeHtml(s);
      s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
      s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      return s;
    }
    function renderMarkdown(text) {
      const lines = text.split("\n");
      let html = "", inList = false, i = 0;
      const closeList = () => { if (inList) { html += "</ul>"; inList = false; } };
      const isTableRow = (l) => /^\s*\|(.+)\|\s*$/.test(l);
      const isSep = (l) => /^\s*\|?[\s:|\-]+\|?\s*$/.test(l) && l.includes("-");
      const parseRow = (l) => l.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map(c => c.trim());

      while (i < lines.length) {
        const raw = lines[i];
        const fence = raw.match(/^\s*```(\w*)\s*$/);
        if (fence) {
          closeList();
          const code = [];
          i++;
          while (i < lines.length && !/^\s*```\s*$/.test(lines[i])) { code.push(lines[i]); i++; }
          i++;
          html += '<pre><code>' + escapeHtml(code.join("\n")) + '</code></pre>';
          continue;
        }
        if (isTableRow(raw) && i + 1 < lines.length && isSep(lines[i + 1])) {
          closeList();
          const headers = parseRow(raw);
          i += 2;
          const rows = [];
          while (i < lines.length && isTableRow(lines[i])) { rows.push(parseRow(lines[i])); i++; }
          let t = '<div class="tbl-wrap"><table><thead><tr>' +
            headers.map(h => "<th>" + inline(h) + "</th>").join("") + "</tr></thead><tbody>";
          rows.forEach(r => { t += "<tr>" + r.map(c => "<td>" + inline(c) + "</td>").join("") + "</tr>"; });
          t += "</tbody></table></div>";
          html += t;
          continue;
        }
        const line = raw.trimEnd();
        let m;
        if ((m = line.match(/^###\s+(.*)/))) { closeList(); html += "<h4>" + inline(m[1]) + "</h4>"; }
        else if ((m = line.match(/^##\s+(.*)/))) { closeList(); html += "<h3>" + inline(m[1]) + "</h3>"; }
        else if ((m = line.match(/^#\s+(.*)/))) { closeList(); html += "<h3>" + inline(m[1]) + "</h3>"; }
        else if ((m = line.match(/^\s*[-*]\s+(.*)/))) { if (!inList) { html += "<ul>"; inList = true; } html += "<li>" + inline(m[1]) + "</li>"; }
        else if (line.trim() === "") { closeList(); }
        else { closeList(); html += "<p>" + inline(line) + "</p>"; }
        i++;
      }
      closeList();
      return html;
    }

    function newTurn(role) {
      const turn = document.createElement("div");
      turn.className = "turn " + role;
      const rlabel = document.createElement("div");
      rlabel.className = "role";
      rlabel.textContent = role === "user" ? "나" : "도우미";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      turn.appendChild(rlabel);
      turn.appendChild(bubble);
      logEl.appendChild(turn);
      logEl.scrollTop = logEl.scrollHeight;
      return { turn, bubble };
    }

    // 선택값 없이 물었을 때: 어느 폴더에 물을지 칩으로 되묻는다(클릭 시 체크 후 재질문).
    function renderNeedsSource(bubble, question, srcList) {
      bubble.innerHTML = "";
      const p = document.createElement("p");
      if (!srcList.length) {
        p.innerHTML = '등록된 폴더가 없습니다. 관리자에게 폴더 등록을 요청하세요.';
        bubble.appendChild(p);
        return;
      }
      p.textContent = "어느 폴더에서 찾을까요? 아래에서 고르면 그 폴더를 체크하고 다시 질문합니다.";
      bubble.appendChild(p);
      const box = document.createElement("div");
      box.className = "ask-source";
      srcList.forEach(s => {
        const chip = document.createElement("div");
        chip.className = "src-chip";
        chip.innerHTML = "<b>" + escapeHtml(s.division || "학사") + "</b> " + escapeHtml(s.label || "");
        chip.addEventListener("click", () => {
          setSelectedSourceIds([s.id]);
          qEl.value = question;
          autoGrow();
          send();
        });
        box.appendChild(chip);
      });
      bubble.appendChild(box);
    }

    function scrollDown() {
      const nearBottom = logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 120;
      if (nearBottom) logEl.scrollTop = logEl.scrollHeight;
    }

    function renderAnswerExtras(turnObj, messageId, srcs) {
      if (srcs && srcs.length) {
        const panel = document.createElement("div");
        panel.className = "sources-panel";
        panel.innerHTML =
          '<div class="sp-title">📎 참고 문서 <span class="sp-hint">(클릭하면 원본 다운로드)</span></div>' +
          '<div class="sp-list">' +
          srcs.map(s => {
            const label = escapeHtml(s.title || s.path || "");
            if (s.source && s.path) {
              const href = "/api/source-file?source=" + encodeURIComponent(s.source) +
                           "&path=" + encodeURIComponent(s.path);
              return '<a class="sp-item dl" href="' + href + '" download title="다운로드">' +
                     label + ' <span class="dl-ic">⬇</span></a>';
            }
            return '<span class="sp-item">' + label + '</span>';
          }).join("") +
          '</div>';
        turnObj.turn.appendChild(panel);
      }
      if (!messageId) return;
      const bar = document.createElement("div");
      bar.className = "fb-bar";
      bar.innerHTML =
        '<button class="fb-btn" data-r="up" title="도움이 됐어요">👍</button>' +
        '<button class="fb-btn" data-r="down" title="아쉬워요">👎</button>' +
        '<span class="fb-msg"></span>';
      const msgEl = bar.querySelector(".fb-msg");
      let commentBox = null;
      bar.querySelectorAll(".fb-btn").forEach(b => {
        b.addEventListener("click", () => {
          const rating = b.getAttribute("data-r");
          bar.querySelectorAll(".fb-btn").forEach(x => x.classList.remove("active"));
          b.classList.add("active");
          if (rating === "down") {
            if (commentBox) return;
            commentBox = document.createElement("div");
            commentBox.className = "fb-comment";
            commentBox.innerHTML =
              '<textarea maxlength="500" placeholder="무엇이 아쉬웠나요? (선택, 500자 이내)"></textarea>' +
              '<button class="fb-send">보내기</button>';
            bar.appendChild(commentBox);
            commentBox.querySelector(".fb-send").addEventListener("click", () => {
              const c = commentBox.querySelector("textarea").value.trim();
              sendFeedback(messageId, "down", c, msgEl);
              commentBox.remove(); commentBox = null;
            });
          } else {
            sendFeedback(messageId, "up", "", msgEl);
          }
        });
      });
      turnObj.turn.appendChild(bar);
    }

    async function sendFeedback(messageId, rating, comment, msgEl) {
      try {
        const body = { message_id: messageId, rating };
        if (comment) body.comment = comment;
        const res = await fetch("/api/feedback", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-App-Token": APP_TOKEN },
          body: JSON.stringify(body),
        });
        if (msgEl) msgEl.textContent = res.ok ? "피드백 감사합니다." : "전송 실패";
      } catch (_) {
        if (msgEl) msgEl.textContent = "전송 실패";
      }
    }

    function parseSSE(raw) {
      let event = "message", data = null;
      for (const line of raw.split("\n")) {
        if (line.startsWith("event:")) event = line.slice(6).trim();
        else if (line.startsWith("data:")) data = line.slice(5).trim();
      }
      if (data === null) return null;
      try { return { event, data: JSON.parse(data) }; } catch (_) { return null; }
    }

    function setStreaming(on) {
      streaming = on;
      btn.textContent = on ? "중지" : "전송";
      btn.classList.toggle("stop", on);
    }

    // ===== 구분자 체크리스트 =====
    function renderSourceChecklist() {
      if (!sources.length) {
        sourceListEl.innerHTML = '<div class="src-empty">등록된 폴더가 없습니다.<br/>관리자에게 폴더 등록을 요청하세요.</div>';
        return;
      }
      let saved = null;
      try { saved = JSON.parse(localStorage.getItem(sourceStorageKey()) || "null"); } catch (_) {}
      // 저장된 선택이 없으면 기본 출처(없으면 첫 항목) 하나를 기본 선택.
      let preselect;
      if (Array.isArray(saved) && saved.length) {
        const valid = new Set(sources.map(s => s.id));
        preselect = new Set(saved.filter(id => valid.has(id)));
      } else {
        const def = sources.find(s => s.is_default) || sources[0];
        preselect = new Set(def ? [def.id] : []);
      }

      let html = "";
      let lastDivision = null;
      sources.forEach(s => {
        const div = s.division || "학사";
        if (div !== lastDivision) {
          html += '<div class="src-group-label">' + escapeHtml(div) + '</div>';
          lastDivision = div;
        }
        const checked = preselect.has(s.id);
        html +=
          '<label class="src-item' + (checked ? ' checked' : '') + '">' +
            '<input type="checkbox" class="src-cb" value="' + s.id + '"' + (checked ? ' checked' : '') + ' />' +
            '<span class="src-box"></span>' +
            '<span class="src-text"><b>' + escapeHtml(div) + '</b>' + escapeHtml(s.label) + '</span>' +
          '</label>';
      });
      sourceListEl.innerHTML = html;
      sourceListEl.querySelectorAll(".src-cb").forEach(cb => {
        cb.addEventListener("change", () => {
          cb.closest(".src-item").classList.toggle("checked", cb.checked);
          persistSelectedSourceIds();
        });
      });
    }

    function getSelectedSourceIds() {
      return Array.from(sourceListEl.querySelectorAll(".src-cb:checked"))
        .map(c => parseInt(c.value, 10))
        .filter(n => Number.isInteger(n));
    }

    function setSelectedSourceIds(ids) {
      const want = new Set(ids);
      sourceListEl.querySelectorAll(".src-cb").forEach(cb => {
        const on = want.has(parseInt(cb.value, 10));
        cb.checked = on;
        cb.closest(".src-item").classList.toggle("checked", on);
      });
      persistSelectedSourceIds();
    }

    function persistSelectedSourceIds() {
      try { localStorage.setItem(sourceStorageKey(), JSON.stringify(getSelectedSourceIds())); } catch (_) {}
    }

    async function loadSources() {
      try {
        const res = await fetch("/api/sources");
        const data = await res.json();
        sources = (data.sources || []).filter(s => s.enabled);
        renderSourceChecklist();
      } catch (_) {
        sourceListEl.innerHTML = '<div class="src-empty">목록을 불러오지 못했습니다.</div>';
      }
    }

    document.getElementById("selAll").addEventListener("click", () => {
      setSelectedSourceIds(sources.map(s => s.id));
    });
    document.getElementById("selNone").addEventListener("click", () => {
      setSelectedSourceIds([]);
    });

    async function send() {
      if (streaming) { stop(); return; }
      const question = qEl.value.trim();
      if (!question) return;
      if (emptyEl && emptyEl.parentNode) emptyEl.remove();

      newTurn("user").bubble.textContent = question;
      qEl.value = ""; autoGrow();

      const a = newTurn("assistant");
      const meta = document.createElement("div");
      meta.className = "meta";
      a.turn.appendChild(meta);
      let statusEl = document.createElement("div");
      statusEl.className = "status-line";
      statusEl.innerHTML = '<span class="spinner"></span> 문서를 읽고 답변을 준비하는 중…';
      a.bubble.appendChild(statusEl);

      controller = new AbortController();
      setStreaming(true);
      let acc = "";
      let aborted = false;
      let doneMessageId = null;
      let doneSources = [];

      try {
        const selectedIds = getSelectedSourceIds();
        const res = await fetch("/api/ask/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-App-Token": APP_TOKEN },
          body: JSON.stringify({
            question,
            session_id: sessionId,
            source_ids: selectedIds,
            source_id: selectedIds.length === 1 ? selectedIds[0] : null,
            dev_view: document.getElementById("devView").checked,
          }),
          signal: controller.signal,
        });
        if (!res.ok) {
          const d = await res.json().catch(() => ({}));
          a.bubble.innerHTML = "<p>⚠️ " + (d.error || "오류가 발생했습니다.") + "</p>";
          return;
        }
        if ((res.headers.get("content-type") || "").includes("application/json")) {
          const d = await res.json().catch(() => ({}));
          if (statusEl) { statusEl.remove(); statusEl = null; }
          if (d.needs_source) {
            if (d.session_id) {
              sessionId = d.session_id;
              try { localStorage.setItem(sessionStorageKey(), sessionId); } catch (_) {}
            }
            renderNeedsSource(a.bubble, question, d.sources || []);
            return;
          }
          a.bubble.innerHTML = "<p>⚠️ " + (d.error || "오류가 발생했습니다.") + "</p>";
          return;
        }
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = "";
        const render = () => {
          a.bubble.innerHTML = renderMarkdown(acc) + '<span class="cursor"></span>';
          scrollDown();
        };
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          let idx;
          while ((idx = buf.indexOf("\n\n")) >= 0) {
            const ev = parseSSE(buf.slice(0, idx));
            buf = buf.slice(idx + 2);
            if (!ev) continue;
            if (ev.event === "meta") {
              currentStreamId = ev.data.stream_id || null;
              meta.innerHTML =
                '<span class="tag cat">' + (ev.data.category || "전체") + '</span>' +
                (ev.data.files || []).map(f => '<span class="tag">' + escapeHtml(f) + '</span>').join("");
            } else if (ev.event === "delta") {
              if (statusEl) { statusEl.remove(); statusEl = null; }
              acc += ev.data.text;
              render();
            } else if (ev.event === "error") {
              acc += "\n\n⚠️ " + (ev.data.error || "오류");
              render();
            } else if (ev.event === "done") {
              if (ev.data.session_id) {
                sessionId = ev.data.session_id;
                try { localStorage.setItem(sessionStorageKey(), sessionId); } catch (_) {}
              }
              doneMessageId = ev.data.message_id || null;
              doneSources = ev.data.sources || [];
            }
          }
        }
      } catch (e) {
        if (e.name === "AbortError") { aborted = true; }
        else { a.bubble.innerHTML = (acc ? renderMarkdown(acc) : "") + "<p>⚠️ 네트워크 오류가 발생했습니다.</p>"; }
      } finally {
        a.bubble.innerHTML = acc ? renderMarkdown(acc) : a.bubble.innerHTML;
        if (statusEl && acc === "") { a.bubble.innerHTML = ""; }
        if (aborted) {
          const note = document.createElement("div");
          note.className = "status-line";
          note.style.color = "var(--danger)";
          note.textContent = "■ 사용자가 생성을 중지했습니다.";
          a.bubble.appendChild(note);
        } else if (acc) {
          renderAnswerExtras(a, doneMessageId, doneSources);
        }
        setStreaming(false);
        controller = null;
        currentStreamId = null;
        qEl.focus();
      }
    }

    function stop() {
      if (currentStreamId) {
        fetch("/api/ask/cancel", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-App-Token": APP_TOKEN },
          body: JSON.stringify({ stream_id: currentStreamId }),
          keepalive: true,
        }).catch(() => {});
      }
      if (controller) controller.abort();
    }

    // ---- 입력 동작 ----
    function autoGrow() {
      qEl.style.height = "auto";
      qEl.style.height = Math.min(qEl.scrollHeight, 180) + "px";
    }
    qEl.addEventListener("input", autoGrow);
    qEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey && !e.isComposing) { e.preventDefault(); send(); }
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && streaming) { e.preventDefault(); stop(); }
    });
    btn.addEventListener("click", send);

    // ===== 로그인 사용자/권한 =====
    async function loadMe() {
      try {
        const res = await fetch("/api/me");
        if (!res.ok) { window.location.href = "/login"; return; }
        const me = await res.json();
        currentUsername = me.username || "";
        const isAdmin = me.role === "admin";
        document.getElementById("userInfo").textContent = me.username + (isAdmin ? " (관리자)" : " (사용자)");
        document.getElementById("sourcesLink").style.display = isAdmin ? "" : "none";
        document.getElementById("adminLink").style.display = isAdmin ? "" : "none";
      } catch (_) {}
    }
    document.getElementById("logoutBtn").addEventListener("click", async () => {
      try {
        localStorage.removeItem(sessionStorageKey());
        await fetch("/api/logout", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-App-Token": APP_TOKEN },
          body: "{}",
        });
      } catch (_) {}
      window.location.href = "/login";
    });

    document.querySelectorAll(".example").forEach(el => {
      el.addEventListener("click", () => { qEl.value = el.textContent; autoGrow(); qEl.focus(); send(); });
    });

    // ===== 대화 이력 =====
    const drawer = document.getElementById("drawer");
    const drawerOverlay = document.getElementById("drawerOverlay");
    const histListEl = document.getElementById("histList");

    function openDrawer() { drawer.classList.add("open"); drawerOverlay.classList.add("open"); loadHistory(); }
    function closeDrawer() { drawer.classList.remove("open"); drawerOverlay.classList.remove("open"); }

    function appendMessage(role, content, files) {
      const t = newTurn(role);
      if (role === "user") {
        t.bubble.textContent = content;
      } else {
        t.bubble.innerHTML = renderMarkdown(content || "");
        if (files && files.length) {
          const meta = document.createElement("div");
          meta.className = "meta";
          meta.innerHTML = files.map(f => '<span class="tag">' + escapeHtml(f) + '</span>').join("");
          t.turn.appendChild(meta);
        }
      }
    }

    async function loadHistory() {
      histListEl.innerHTML = '<div class="hist-empty">불러오는 중…</div>';
      try {
        const res = await fetch("/api/history");
        const data = await res.json();
        const rows = data.conversations || [];
        if (!rows.length) { histListEl.innerHTML = '<div class="hist-empty">대화 이력이 없습니다.</div>'; return; }
        histListEl.innerHTML = "";
        rows.forEach(c => {
          const item = document.createElement("div");
          item.className = "hist-item" + (c.session_id === sessionId ? " active" : "");
          item.innerHTML =
            '<div class="hist-title">' + escapeHtml(c.title) + '</div>' +
            '<div class="hist-meta">' + (c.count || 0) + '개 메시지</div>' +
            '<button class="hist-del" title="삭제">✕</button>';
          item.addEventListener("click", () => openConversation(c.session_id));
          item.querySelector(".hist-del").addEventListener("click", (e) => {
            e.stopPropagation(); deleteConversation(c.session_id);
          });
          histListEl.appendChild(item);
        });
      } catch (_) {
        histListEl.innerHTML = '<div class="hist-empty">목록을 불러오지 못했습니다.</div>';
      }
    }

    async function renderConversation(sid) {
      const res = await fetch("/api/history/" + encodeURIComponent(sid));
      const data = await res.json();
      const msgs = data.messages || [];
      logEl.innerHTML = "";
      msgs.forEach(m => appendMessage(m.role, m.content, m.files));
      logEl.scrollTop = logEl.scrollHeight;
      return msgs.length;
    }

    async function openConversation(sid) {
      try {
        const n = await renderConversation(sid);
        sessionId = sid;
        try { localStorage.setItem(sessionStorageKey(), sid); } catch (_) {}
        if (!n) showEmpty("이 대화에는 메시지가 없습니다.");
      } catch (_) {}
      closeDrawer();
      qEl.focus();
    }

    async function deleteConversation(sid) {
      if (!confirm("이 대화를 삭제할까요?")) return;
      try {
        await fetch("/api/history/delete", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-App-Token": APP_TOKEN },
          body: JSON.stringify({ session_id: sid }),
        });
      } catch (_) {}
      if (sid === sessionId) newConversation();
      loadHistory();
    }

    function showEmpty(msg) {
      logEl.innerHTML = "";
      const d = document.createElement("div");
      d.className = "empty";
      d.innerHTML = "<h2>" + escapeHtml(msg || "새 대화") + "</h2>" +
        "<div>왼쪽에서 질문할 폴더를 체크하고 질문하세요.</div>";
      logEl.appendChild(d);
    }

    function newConversation() {
      sessionId = null;
      try { localStorage.removeItem(sessionStorageKey()); } catch (_) {}
      showEmpty("새 대화");
      closeDrawer();
      qEl.focus();
    }

    // 개발자 관점 토글(기본 OFF) + 선택 기억
    const devViewEl = document.getElementById("devView");
    const devToggleEl = document.getElementById("devToggle");
    try { if (localStorage.getItem("devView") === "1") devViewEl.checked = true; } catch (_) {}
    const syncDevToggle = () => {
      devToggleEl.classList.toggle("checked", devViewEl.checked);
      try { localStorage.setItem("devView", devViewEl.checked ? "1" : "0"); } catch (_) {}
    };
    devViewEl.addEventListener("change", syncDevToggle);
    syncDevToggle();

    document.getElementById("histBtn").addEventListener("click", openDrawer);
    document.getElementById("newBtn").addEventListener("click", newConversation);
    document.getElementById("drawerClose").addEventListener("click", closeDrawer);
    drawerOverlay.addEventListener("click", closeDrawer);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && drawer.classList.contains("open")) closeDrawer();
    });

    // 새로고침 시 현재 로그인 계정의 직전 대화 복원
    (async function restore() {
      await loadMe();
      await loadSources();
      let saved = null;
      try { saved = localStorage.getItem(sessionStorageKey()); } catch (_) {}
      if (!saved) return;
      try {
        const n = await renderConversation(saved);
        if (n) { sessionId = saved; if (emptyEl && emptyEl.parentNode) emptyEl.remove(); }
      } catch (_) {}
    })();

    qEl.focus();
  </script>
