<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>로그인 · 업무 문서 Q&A</title>
  <style>
    :root {
      --bg: #0f1419; --panel: #1a212b; --panel-2: #222b37; --border: #2c3744;
      --text: #e6edf3; --muted: #8b97a6; --accent: #3b82f6; --accent-2: #2563eb;
      --danger: #ef4444; --ok: #22c55e;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .card {
      width: 360px; max-width: calc(100vw - 32px);
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; padding: 30px 26px 26px;
      box-shadow: 0 12px 40px rgba(0,0,0,.4);
    }
    .brand { display: flex; align-items: center; gap: 9px; margin-bottom: 4px; }
    .brand .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 8px var(--ok); }
    .brand h1 { font-size: 17px; margin: 0; font-weight: 700; }
    .sub { color: var(--muted); font-size: 12.5px; margin: 2px 0 22px; }
    label { display: block; font-size: 12.5px; color: var(--muted); margin: 14px 0 6px; }
    input[type=text], input[type=password] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text); font-size: 14.5px; padding: 11px 12px;
      font-family: inherit;
    }
    input:focus { outline: none; border-color: var(--accent); }
    button.primary {
      width: 100%; margin-top: 22px; border: none; border-radius: 10px; cursor: pointer;
      background: var(--accent-2); color: #fff; font-size: 15px; font-weight: 600; padding: 12px;
      font-family: inherit;
    }
    button.primary:hover { background: var(--accent); }
    button.primary:disabled { opacity: .6; cursor: default; }
    .msg { font-size: 13px; min-height: 18px; margin-top: 14px; text-align: center; }
    .msg.err { color: var(--danger); }
    .hint { font-size: 11.5px; color: var(--muted); margin-top: 18px; line-height: 1.6; text-align: center; }
  </style>
</head>
<body>
  <form class="card" id="loginForm" autocomplete="on">
    <div class="brand"><span class="dot"></span><h1>업무 문서 Q&A</h1></div>
    <div class="sub"> 로그인이 필요합니다</div>

    <label for="username">아이디</label>
    <input type="text" id="username" name="username" autocomplete="username" autofocus />

    <label for="password">비밀번호</label>
    <input type="password" id="password" name="password" autocomplete="current-password" />

    <button class="primary" id="submitBtn" type="submit">로그인</button>
    <div class="msg" id="msg"></div>
  </form>

  <script>
    const APP_TOKEN = "__APP_TOKEN__";
    const $ = (id) => document.getElementById(id);
    const msgEl = $("msg");

    function setMsg(text, kind) {
      msgEl.textContent = text || "";
      msgEl.className = "msg" + (kind ? " " + kind : "");
    }

    $("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = $("username").value.trim();
      const password = $("password").value;
      if (!username || !password) { setMsg("아이디와 비밀번호를 입력해주세요.", "err"); return; }
      $("submitBtn").disabled = true;
      setMsg("로그인 중…");
      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-App-Token": APP_TOKEN },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          setMsg(data.error || "로그인에 실패했습니다.", "err");
          $("submitBtn").disabled = false;
          return;
        }
        if (data.must_change_password) {
          // 기본 비밀번호(admin)인 경우 변경을 권고.
          alert("초기 비밀번호를 사용 중입니다. 로그인 후 비밀번호를 변경해주세요.");
        }
        window.location.href = "/";
      } catch (_) {
        setMsg("네트워크 오류가 발생했습니다.", "err");
        $("submitBtn").disabled = false;
      }
    });
  </script>
</body>
</html>
